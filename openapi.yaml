openapi: 3.0.3
info:
  title: cupbored.ai API
  description: AI-powered ingredient detection and recipe matching platform
  version: v1
servers:
  - url: https://api.cupbored.ai/api/v1
    description: Production
paths:
  /sign_up:
    post:
      summary: Register a new user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, password_confirmation]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                password_confirmation:
                  type: string
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'

  /sign_in:
    post:
      summary: Create a session (sign in)
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '201':
          description: Session created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      session:
                        $ref: '#/components/schemas/Session'
                      token:
                        type: string
                        description: Bearer token for authenticated requests
        '401':
          $ref: '#/components/responses/Unauthorized'

  /sessions:
    get:
      summary: List active sessions
      tags: [Auth]
      security:
        - bearer_auth: []
      responses:
        '200':
          description: Active sessions
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Session'

  /sessions/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      summary: Show a session
      tags: [Auth]
      security:
        - bearer_auth: []
      responses:
        '200':
          description: Session detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Session'
    delete:
      summary: Destroy a session
      tags: [Auth]
      security:
        - bearer_auth: []
      responses:
        '200':
          description: Session destroyed
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      message:
                        type: string

  /password:
    patch:
      summary: Update password
      tags: [Auth]
      security:
        - bearer_auth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password, password_confirmation]
              properties:
                password:
                  type: string
                password_confirmation:
                  type: string
                password_challenge:
                  type: string
      responses:
        '200':
          description: Password updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'

  /scans:
    post:
      summary: Create a scan (upload image + optional manual ingredients)
      tags: [Scans]
      security:
        - bearer_auth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  format: binary
                  description: Photo of ingredients (JPEG, PNG)
                ingredients:
                  type: array
                  items:
                    type: string
                  maxItems: 10
                  description: Optional manual ingredient names (max 10, profanity-filtered)
      responses:
        '201':
          description: Scan created, processing enqueued
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Scan'
              example:
                data:
                  id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                  status: uploading
                  rejection_reason: null
                  ingredients: null
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          description: Too many ingredients
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
              example:
                errors: ["Too many ingredients (maximum 10)"]

  /scans/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      summary: Show scan status and ingredients
      tags: [Scans]
      security:
        - bearer_auth: []
      responses:
        '200':
          description: Scan detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Scan'
              example:
                data:
                  id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                  status: completed
                  rejection_reason: null
                  ingredients:
                    - name: chicken
                      raw_name: Chicken breast
                      category: protein
                      confidence: 0.95
                    - name: lemon
                      raw_name: lemon
                      category: other
                      confidence: 1.0
        '404':
          description: Scan not found or belongs to another user
    delete:
      summary: Delete a scan
      tags: [Scans]
      security:
        - bearer_auth: []
      responses:
        '204':
          description: Scan deleted

  /matches:
    get:
      summary: Explore community matches (paginated)
      tags: [Matches]
      security:
        - bearer_auth: []
      parameters:
        - name: q
          in: query
          description: Fuzzy ingredient search (pg_trgm trigram matching)
          schema:
            type: string
        - name: sort
          in: query
          description: Sort order
          schema:
            type: string
            enum: [trending, most_saved, latest]
            default: trending
        - name: min_saves
          in: query
          description: Minimum bookmark count filter
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        '200':
          description: Paginated matches
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Match'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
              example:
                data:
                  - id: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
                    user_id: "c3d4e5f6-a7b8-9012-cdef-123456789012"
                    public: true
                    saves_count: 12
                    trending_score: 8.5
                    created_at: "2026-05-15T10:30:00Z"
                    ingredients:
                      - name: chicken
                        raw_name: Chicken breast
                        category: protein
                        confidence: 0.95
                pagination:
                  page: 1
                  pages: 5
                  count: 47
    post:
      summary: Create a match from a completed scan
      tags: [Matches]
      security:
        - bearer_auth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [scan_id]
              properties:
                scan_id:
                  type: string
                  format: uuid
                public:
                  type: boolean
                  default: false
      responses:
        '201':
          description: Match created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Match'
        '404':
          description: Scan not found or not completed
        '422':
          $ref: '#/components/responses/UnprocessableContent'

  /matches/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      summary: Show a public match
      tags: [Matches]
      security:
        - bearer_auth: []
      responses:
        '200':
          description: Match detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Match'

  /bookmarks:
    post:
      summary: Bookmark a match
      tags: [Bookmarks]
      security:
        - bearer_auth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [match_id]
              properties:
                match_id:
                  type: string
                  format: uuid
      responses:
        '201':
          description: Bookmark created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      match_id:
                        type: string
                        format: uuid
        '422':
          description: Already bookmarked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
              example:
                errors: ["already_bookmarked"]

  /bookmarks/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    delete:
      summary: Remove a bookmark
      tags: [Bookmarks]
      security:
        - bearer_auth: []
      responses:
        '204':
          description: Bookmark removed

  /profile/cuisine_preferences:
    get:
      summary: Get cuisine preferences and available options
      tags: [Profile]
      security:
        - bearer_auth: []
      responses:
        '200':
          description: Current preferences
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      cuisines:
                        type: array
                        items:
                          type: string
                      available:
                        type: array
                        items:
                          type: string
    put:
      summary: Replace all cuisine preferences
      tags: [Profile]
      security:
        - bearer_auth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                cuisines:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Preferences updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      cuisines:
                        type: array
                        items:
                          type: string

  /profile/cuisine_suggestions:
    post:
      summary: Suggest a new cuisine for the platform
      tags: [Profile]
      security:
        - bearer_auth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        '201':
          description: Suggestion created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      name:
                        type: string
        '422':
          $ref: '#/components/responses/UnprocessableContent'

components:
  securitySchemes:
    bearer_auth:
      type: http
      scheme: bearer
      description: Session token returned from POST /sign_in

  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        verified:
          type: boolean
        created_at:
          type: string
          format: date-time

    Session:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        ip_address:
          type: string
        user_agent:
          type: string
        created_at:
          type: string
          format: date-time

    Scan:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [uploading, detecting, completed, failed]
        rejection_reason:
          type: string
          nullable: true
          enum: [no_food, no_label, unprocessable, null]
        ingredients:
          type: array
          nullable: true
          description: Present only when status is completed
          items:
            $ref: '#/components/schemas/Ingredient'

    Ingredient:
      type: object
      properties:
        name:
          type: string
          description: Normalised ingredient name
        raw_name:
          type: string
          description: Original name (from AI detection or manual input)
        category:
          type: string
          enum: [protein, vegetable, fruit, grain, dairy, condiment, spice, beverage, other]
        confidence:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: AI confidence score (1.0 for manual ingredients)

    Match:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        public:
          type: boolean
        saves_count:
          type: integer
        trending_score:
          type: number
          format: float
        created_at:
          type: string
          format: date-time
        ingredients:
          type: array
          items:
            $ref: '#/components/schemas/Ingredient'

    Pagination:
      type: object
      properties:
        page:
          type: integer
        pages:
          type: integer
        count:
          type: integer

    Errors:
      type: object
      properties:
        errors:
          type: array
          items:
            type: string

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Errors'
          example:
            errors: ["Bad Request"]
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Errors'
          example:
            errors: ["That email or password is incorrect"]
    UnprocessableContent:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Errors'
